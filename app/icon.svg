<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1bf8c3"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Premium Dark Glass Background -->
  <rect x="5" y="5" width="90" height="90" rx="25" fill="#091225" stroke="#13223f" stroke-width="4"/>
  
  <!-- Cyan/Blue Lightning Bolt -->
  <path d="M56 20 L32 55 L50 55 L44 80 L72 45 L52 45 Z" fill="url(#boltGrad)" filter="url(#glow)"/>
